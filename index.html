<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리터러시 자가 진단 | 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=Do+Hyeon&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1A2E4A;
    --blue: #2563A8;
    --cyan: #0891B2;
    --teal: #0D9488;
    --orange: #F97316;
    --white: #FFFFFF;
    --off: #F8FAFC;
    --border: #E2E8F0;
    --text: #1E293B;
    --sub: #64748B;
    --c-blue: #2563A8;
    --c-teal: #0D9488;
    --c-lav: #7C3AED;
    --c-amber: #D97706;
    --bg-blue: rgba(37,99,168,.10);
    --bg-teal: rgba(13,148,136,.10);
    --bg-lav: rgba(124,58,237,.10);
    --bg-amber: rgba(217,119,6,.10);
  }

  body {
    font-family: 'Gowun Batang', Georgia, serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  #app {
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  /* ── 화면 전환 ── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* ── 인트로 ── */
  .intro-label {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 12px;
    letter-spacing: .12em;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .intro-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(44px, 10vw, 64px);
    line-height: 1.05;
    color: var(--navy);
    margin-bottom: 2rem;
  }
  .intro-title em { color: var(--blue); font-style: normal; }
  .intro-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .intro-cat {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid currentColor;
    opacity: .85;
  }
  .intro-cat.col-blue  { color: var(--c-blue);  background: var(--bg-blue); }
  .intro-cat.col-teal  { color: var(--c-teal);  background: var(--bg-teal); }
  .intro-cat.col-lav   { color: var(--c-lav);   background: var(--bg-lav); }
  .intro-cat.col-amber { color: var(--c-amber); background: var(--bg-amber); }

  .intro-meta {
    font-size: 15px;
    line-height: 1.8;
    color: var(--sub);
    margin-bottom: 2.5rem;
  }
  .btn-start {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 17px;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: .05em;
    transition: background .2s;
  }
  .btn-start:hover { background: var(--blue); }

  /* ── 문항 ── */
  .q-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .q-num {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 52px;
    color: var(--navy);
    line-height: 1;
  }
  .q-num span { font-size: 18px; color: var(--sub); margin-left: 4px; }

  .dot-prog {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 200px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .dot.done { background: var(--navy); }
  .dot.cur  { background: var(--blue); }

  .cat-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Do Hyeon', sans-serif;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 1.25rem;
  }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; }

  .q-body {
    font-size: 18px;
    line-height: 1.65;
    margin-bottom: 2rem;
    color: var(--text);
  }
  .q-hint {
    font-size: 12px;
    color: var(--sub);
    margin-top: 1.5rem;
    text-align: center;
  }

  .ans-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .ans-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 6px 12px;
    cursor: pointer;
    text-align: center;
    transition: all .18s;
  }
  .ans-btn:hover { border-color: var(--blue); transform: translateY(-2px); }
  .ans-btn .score-num {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 26px;
    display: block;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .ans-btn .score-label {
    font-size: 11px;
    color: var(--sub);
    line-height: 1.3;
  }
  .ans-btn:hover .score-num { color: var(--blue); }

  /* ── 결과 ── */
  .result-big {
    font-family: 'Do Hyeon', sans-serif;
    font-size: clamp(56px, 14vw, 80px);
    color: var(--navy);
    line-height: 1;
    margin-bottom: .25rem;
  }
  .result-big span { font-size: 22px; color: var(--sub); margin-left: 4px; }
  .result-level {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: var(--blue);
    margin-bottom: .5rem;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.75;
    color: var(--sub);
    margin-bottom: 2.5rem;
    max-width: 500px;
  }

  .bars-wrap { margin-bottom: 2.5rem; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .bar-cat {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 13px;
    width: 96px;
    flex-shrink: 0;
    color: var(--text);
  }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    width: 0;
    transition: width .7s ease;
  }
  .bar-score {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 13px;
    width: 36px;
    text-align: right;
    color: var(--sub);
  }

  .result-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-outline {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 15px;
    background: transparent;
    border: 1px solid var(--navy);
    color: var(--navy);
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .04em;
  }
  .btn-outline:hover { background: var(--navy); color: #fff; }
  .btn-primary {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 15px;
    background: var(--blue);
    border: none;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .18s;
    letter-spacing: .04em;
  }
  .btn-primary:hover { background: var(--navy); }

  /* 다음 단계 카드 */
  .next-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }
  .next-card h3 {
    font-family: 'Do Hyeon', sans-serif;
    font-size: 16px;
    color: var(--navy);
    margin-bottom: .75rem;
  }
  .next-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .next-card li {
    font-size: 14px;
    color: var(--sub);
    padding-left: 1rem;
    position: relative;
    line-height: 1.5;
  }
  .next-card li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--blue);
  }

  @media (max-width: 480px) {
    .ans-grid { grid-template-columns: repeat(2, 1fr); }
    .result-btns { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── 인트로 ── -->
  <div class="screen active" id="s-intro">
    <p class="intro-label">Self Check · 2026 | 제주공공정책연수원</p>
    <h1 class="intro-title">AI 리터러시<br><em>자가 진단</em></h1>
    <div class="intro-cats">
      <span class="intro-cat col-blue">기초 이해</span>
      <span class="intro-cat col-teal">도구 활용</span>
      <span class="intro-cat col-lav">프롬프트 역량</span>
      <span class="intro-cat col-amber">비판·윤리 의식</span>
    </div>
    <p class="intro-meta">
      12개 문항 · 4개 영역 · 약 3분<br>
      나의 AI 활용 수준을 솔직하게 점검해보세요.<br>
      총 36점 만점 · 5단계 레벨
    </p>
    <button class="btn-start" onclick="startQuiz()">진단 시작하기</button>
  </div>

  <!-- ── 문항 ── -->
  <div class="screen" id="s-question">
    <div class="q-top">
      <div class="q-num" id="q-num">01<span>/ 12</span></div>
      <div class="dot-prog" id="dot-prog"></div>
    </div>
    <span class="cat-tag" id="cat-tag">
      <span class="cat-dot" id="cat-dot"></span>
      <span id="cat-label"></span>
    </span>
    <p class="q-body" id="q-body"></p>
    <div class="ans-grid" id="ans-grid"></div>
    <p class="q-hint">선택하면 자동으로 다음 문항으로 이동합니다</p>
  </div>

  <!-- ── 결과 ── -->
  <div class="screen" id="s-result">
    <p class="intro-label">진단 완료</p>
    <div class="result-big" id="r-score">0<span>/ 36점</span></div>
    <div class="result-level" id="r-level">AI 활용자</div>
    <p class="result-desc" id="r-desc"></p>

    <div class="bars-wrap" id="r-bars"></div>

    <div class="next-card" id="r-next">
      <h3>다음 단계 추천</h3>
      <ul id="r-next-list"></ul>
    </div>

    <div class="result-btns">
      <button class="btn-outline" onclick="restart()">다시 진단하기</button>
      <button class="btn-primary" onclick="shareResult()">맞춤 학습 로드맵 받기 ↗</button>
    </div>
  </div>

</div>

<script>
const CATS = {
  "기초 이해":     { color: "#2563A8", bg: "rgba(37,99,168,.1)"  },
  "도구 활용":     { color: "#0D9488", bg: "rgba(13,148,136,.1)" },
  "프롬프트 역량": { color: "#7C3AED", bg: "rgba(124,58,237,.1)" },
  "비판·윤리 의식":{ color: "#D97706", bg: "rgba(217,119,6,.1)"  },
};

const Qs = [
  /* ───── 기초 이해 ───── */
  { cat: "기초 이해",
    q: "생성형 AI(ChatGPT, Claude, Gemini 등)가 답변을 만들어내는 원리에 대해 어느 정도 알고 있나요?",
    opts: ["전혀 모른다","이름만 들어봤다","대략 설명할 수 있다","정확히 설명할 수 있다"] },
  { cat: "기초 이해",
    q: "AI가 '사실인 것처럼' 틀린 정보를 생성하는 현상(할루시네이션)의 의미를 알고 있나요?",
    opts: ["모른다","들어본 적 있다","의미를 알고 있다","예시를 들어 설명할 수 있다"] },
  { cat: "기초 이해",
    q: "AI 도구마다 특성과 강점이 다르다는 사실(예: 문서 분석 강점 vs 검색 연동 강점)을 알고 있나요?",
    opts: ["차이를 모른다","어렴풋이 알고 있다","주요 차이를 말할 수 있다","업무별로 선택해 활용한다"] },

  /* ───── 도구 활용 ───── */
  { cat: "도구 활용",
    q: "ChatGPT, Claude, Gemini 중 하나 이상을 실제 업무(보고서 초안, 회의록 요약 등)에 사용해본 경험이 있나요?",
    opts: ["사용 경험 없음","개인 용도로 써봤다","업무에 1~2회 써봤다","정기적으로 활용한다"] },
  { cat: "도구 활용",
    q: "AI로 이미지를 생성하거나 편집하는 도구(Canva AI, Gemini 이미지 등)를 활용해본 적이 있나요?",
    opts: ["전혀 없다","한두 번 체험했다","만들어본 적 있다","실무 자료에 활용했다"] },
  { cat: "도구 활용",
    q: "NotebookLM처럼 문서를 업로드해 AI에게 질문하거나 요약을 받는 도구를 사용해본 적이 있나요?",
    opts: ["모른다","이름만 알고 있다","사용해본 적 있다","업무에 정기 활용한다"] },

  /* ───── 프롬프트 역량 ───── */
  { cat: "프롬프트 역량",
    q: "AI에게 원하는 결과를 얻기 위해 '역할 + 요청 + 조건' 구조로 지시문을 작성할 수 있나요?",
    opts: ["전혀 모른다","들어본 적 있다","간단히 작성할 수 있다","체계적으로 작성할 수 있다"] },
  { cat: "프롬프트 역량",
    q: "AI 답변이 부정확하거나 부족할 때, 후속 질문으로 답변 품질을 개선하는 방법을 알고 있나요?",
    opts: ["모른다","어렴풋이 알고 있다","연속 질문으로 개선할 수 있다","체계적으로 다듬어 쓴다"] },
  { cat: "프롬프트 역량",
    q: "공공기관 업무(공문, 보도자료, 정책 요약 등)에 AI를 활용하는 구체적인 시나리오를 떠올릴 수 있나요?",
    opts: ["떠오르지 않는다","하나 정도 생각난다","2~3가지 생각난다","여러 업무에 바로 적용 가능하다"] },

  /* ───── 비판·윤리 의식 ───── */
  { cat: "비판·윤리 의식",
    q: "AI가 생성한 내용을 공문서나 대외 자료에 사용하기 전 반드시 검증해야 한다는 것을 알고 있나요?",
    opts: ["그냥 믿어도 된다","어느 정도 확인한다","사실 여부를 꼭 확인한다","출처와 근거까지 검토한다"] },
  { cat: "비판·윤리 의식",
    q: "AI 이미지 생성 시 저작권·초상권·공공누리 규정을 확인해야 한다는 사실을 알고 있나요?",
    opts: ["몰랐다","들어본 적 있다","대략 알고 있다","업무에 적용하고 있다"] },
  { cat: "비판·윤리 의식",
    q: "민감한 개인정보·기밀 정보를 AI 도구에 입력할 때의 보안 위험성을 인지하고 있나요?",
    opts: ["별 문제 없다고 생각","약간 우려된다","주의가 필요하다고 안다","입력 전 반드시 검토한다"] },
];

const Levels = [
  { max: 9,  name: "AI 입문자",   desc: "AI 도구를 아직 많이 접해보지 못한 단계예요. 이번 교육이 첫 걸음이 됩니다. 기초 개념부터 차근차근 익혀나가요." },
  { max: 17, name: "AI 탐색자",   desc: "AI에 관심은 있지만 실무 활용은 아직 낯선 단계예요. 오늘 배운 도구를 한 가지씩 업무에 적용해보는 것이 목표입니다." },
  { max: 24, name: "AI 활용자",   desc: "일상적인 AI 활용을 시작한 단계예요. 프롬프트를 정교하게 다듬고, 도구를 목적에 맞게 선택하는 능력을 키울 차례입니다." },
  { max: 30, name: "AI 실무자",   desc: "업무에 AI를 효과적으로 적용하는 단계예요. 보안·윤리 기준을 지키면서 동료들과 활용법을 나누는 것이 다음 단계입니다." },
  { max: 36, name: "AI 선도자",   desc: "AI를 깊이 이해하고 실무에 주도적으로 활용하는 단계예요. 부서 내 AI 활용 문화를 선도하고 후배들을 돕는 역할을 기대합니다." },
];

const NextSteps = {
  "AI 입문자":   ["ChatGPT 또는 Gemini에 오늘 배운 프롬프트 구조로 질문 1개 써보기","AI 관련 기초 유튜브 강의 1개 시청하기","동료와 AI 도구 써본 경험 나눠보기"],
  "AI 탐색자":   ["반복적인 업무 하나를 AI에게 맡겨보기 (예: 회의록 요약)","Gemini 또는 Claude에서 내 업무 관련 질문 5개 테스트해보기","오늘 배운 역할·요청·조건 구조로 프롬프트 만들기"],
  "AI 활용자":   ["프롬프트 라이브러리 만들기 (업무별 자주 쓰는 지시문 모음)","AI 생성 결과물의 사실 확인 절차 루틴화하기","이미지·문서 분석 도구 중 하나를 업무에 시범 적용하기"],
  "AI 실무자":   ["부서 내 AI 활용 가이드라인 초안 작성해보기","보안·저작권 체크리스트를 팀과 공유하기","ChatGPT Builder 또는 Gemini 설정으로 나만의 챗봇 만들어보기"],
  "AI 선도자":   ["팀 대상 AI 활용 사례 공유 세션 기획하기","생성형 AI 관련 공공기관 가이드라인 검토하기","신규 AI 도구 모니터링 루틴 만들기 (월 1회)"],
};

const BarColors = {
  "기초 이해": "#2563A8",
  "도구 활용": "#0D9488",
  "프롬프트 역량": "#7C3AED",
  "비판·윤리 의식": "#D97706",
};

let cur = 0;
let scores = [];

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  cur = 0; scores = [];
  renderQ();
  show('s-question');
}

function renderQ() {
  const q = Qs[cur];
  const cat = CATS[q.cat];

  document.getElementById('q-num').innerHTML = String(cur+1).padStart(2,'0') + '<span>/ 12</span>';

  const dots = document.getElementById('dot-prog');
  dots.innerHTML = Qs.map((_,i) => {
    let cls = 'dot';
    if (i < cur) cls += ' done';
    else if (i === cur) cls += ' cur';
    return `<div class="${cls}"></div>`;
  }).join('');

  const tag = document.getElementById('cat-tag');
  tag.style.background = cat.bg;
  tag.style.color = cat.color;
  document.getElementById('cat-dot').style.background = cat.color;
  document.getElementById('cat-label').textContent = q.cat;

  document.getElementById('q-body').textContent = q.q;

  const grid = document.getElementById('ans-grid');
  grid.innerHTML = q.opts.map((o, i) => `
    <button class="ans-btn" onclick="pick(${i})">
      <span class="score-num">${i}</span>
      <span class="score-label">${o}</span>
    </button>
  `).join('');
}

function pick(val) {
  scores.push(val);
  cur++;
  if (cur < Qs.length) {
    renderQ();
  } else {
    showResult();
  }
}

function showResult() {
  const total = scores.reduce((s,v) => s+v, 0);
  const lv = Levels.find(l => total <= l.max) || Levels[Levels.length-1];

  document.getElementById('r-score').innerHTML = total + '<span>/ 36점</span>';
  document.getElementById('r-level').textContent = lv.name;
  document.getElementById('r-desc').textContent = lv.desc;

  const cats = Object.keys(CATS);
  const barsEl = document.getElementById('r-bars');
  barsEl.innerHTML = cats.map(cat => {
    const idxs = Qs.map((q,i) => q.cat === cat ? i : -1).filter(i => i >= 0);
    const sum = idxs.reduce((s,i) => s+(scores[i]||0), 0);
    const pct = Math.round(sum / (idxs.length * 3) * 100);
    return `
      <div class="bar-row">
        <span class="bar-cat">${cat}</span>
        <div class="bar-track"><div class="bar-fill" id="bf-${cat}" style="background:${BarColors[cat]}"></div></div>
        <span class="bar-score">${sum}/${idxs.length*3}</span>
      </div>`;
  }).join('');

  setTimeout(() => {
    cats.forEach(cat => {
      const idxs = Qs.map((q,i) => q.cat===cat?i:-1).filter(i=>i>=0);
      const sum = idxs.reduce((s,i) => s+(scores[i]||0), 0);
      const pct = Math.round(sum / (idxs.length*3) * 100);
      const el = document.getElementById('bf-'+cat);
      if (el) el.style.width = pct + '%';
    });
  }, 120);

  const steps = NextSteps[lv.name] || [];
  document.getElementById('r-next-list').innerHTML = steps.map(s => `<li>${s}</li>`).join('');

  show('s-result');
}

function restart() {
  startQuiz();
}

function shareResult() {
  const total = scores.reduce((s,v)=>s+v,0);
  const lv = Levels.find(l=>total<=l.max)||Levels[Levels.length-1];
  const cats = Object.keys(CATS);
  const detail = cats.map(cat => {
    const idxs = Qs.map((q,i)=>q.cat===cat?i:-1).filter(i=>i>=0);
    const sum = idxs.reduce((s,i)=>s+(scores[i]||0),0);
    return cat+' '+sum+'/'+(idxs.length*3);
  }).join(' | ');
  const msg = 'AI 리터러시 진단 결과: '+lv.name+' ('+total+'/36점). 영역별: '+detail+'. 이 결과를 바탕으로 공직자 업무에 맞는 구체적인 AI 활용 학습 로드맵을 제안해줘.';
  if (typeof sendPrompt === 'function') {
    sendPrompt(msg);
  } else {
    alert('결과: ' + lv.name + ' (' + total + '/36점)\n\n' + detail);
  }
}
</script>
</body>

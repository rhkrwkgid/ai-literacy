<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리터러시 자가 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=Do+Hyeon&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F7F5F1;
  --bg1:      #EDEAE3;
  --bg2:      #E2DDD5;
  --bg3:      #D2CCC3;
  --line:     rgba(0,0,0,0.08);
  --line2:    rgba(0,0,0,0.16);
  --cream:    #1C1A17;
  --cream2:   #5A5550;
  --cream3:   #918B83;

  --c-blue:   #2670B0;
  --c-teal:   #137A59;
  --c-lav:    #6945BE;
  --c-amber:  #A06A10;

  --serif:   'Noto Sans KR', sans-serif;
  --display: 'Black Han Sans', sans-serif;
  --mono:    'Do Hyeon', sans-serif;
  --sans:    'Noto Sans KR', sans-serif;
}

html { font-size: 18px; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
}

/* ── layout ── */
#app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 3rem 1.75rem 4rem;
  position: relative;
}

/* subtle top accent line */
#app::before {
  content: '';
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 480px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--c-lav) 40%, var(--c-teal) 70%, transparent);
  opacity: 0.6;
}

/* ── screen transitions ── */
.screen { display: none; animation: fadeUp .35s ease forwards; }
.screen.active { display: flex; flex-direction: column; flex: 1; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── INTRO ── */
.intro-label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--cream3);
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

.intro-title {
  font-family: var(--display);
  font-size: 48px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--cream);
  margin-bottom: 2rem;
  letter-spacing: -0.01em;
}

.intro-title em {
  font-style: normal;
  color: var(--c-lav);
}

.intro-cats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 2.5rem;
}

.intro-cat {
  font-size: 12px;
  font-weight: 300;
  padding: 5px 13px;
  border-radius: 100px;
  border: 1px solid;
  letter-spacing: 0.02em;
}

.intro-meta {
  font-size: 12px;
  color: var(--cream3);
  font-weight: 300;
  line-height: 1.8;
  margin-bottom: 3rem;
  padding-bottom: 2.5rem;
  border-bottom: 1px solid var(--line);
}

.btn-start {
  align-self: flex-start;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  color: var(--bg);
  background: var(--cream);
  border: none;
  border-radius: 100px;
  padding: 13px 32px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background .2s, transform .15s;
}
.btn-start:hover { background: #fff; }
.btn-start:active { transform: scale(0.97); }

/* ── QUESTION ── */
.q-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 2rem;
}

.q-num {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 400;
  color: var(--bg3);
  line-height: 1;
  user-select: none;
  letter-spacing: -0.02em;
}

.q-num span {
  font-size: 18px;
  color: var(--cream3);
  font-family: var(--mono);
  font-weight: 400;
  vertical-align: super;
  margin-left: 2px;
  letter-spacing: 0;
}

/* dot progress */
.dot-prog {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  width: 120px;
  justify-content: flex-end;
  padding-top: 8px;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--bg3);
  transition: background .3s, transform .3s;
}
.dot.done { background: var(--cream2); }
.dot.active { background: var(--cream); transform: scale(1.4); }

/* cat tag */
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.06em;
  padding: 4px 12px 4px 8px;
  border-radius: 100px;
  border: 1px solid;
  margin-bottom: 1.25rem;
}

.cat-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* question text */
.q-body {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--cream);
  margin-bottom: 2.5rem;
  flex: 1;
  letter-spacing: 0.01em;
}

/* answer buttons */
.ans-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 1.5rem;
}

.ans-btn {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 6px 13px;
  cursor: pointer;
  text-align: center;
  transition: background .15s, border-color .15s, transform .12s;
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--cream);
}
.ans-btn:hover { background: var(--bg2); border-color: var(--line2); }
.ans-btn:active { transform: scale(0.95); }

.ans-num {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 400;
  line-height: 1;
  color: var(--cream2);
}

.ans-lbl {
  font-size: 10px;
  font-weight: 300;
  color: var(--cream3);
  line-height: 1.4;
  white-space: pre-line;
}

.q-hint {
  font-size: 11px;
  color: var(--cream3);
  text-align: center;
  font-weight: 300;
  letter-spacing: 0.03em;
}

/* ── RESULT ── */
.result-eyebrow {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--cream3);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 1.5rem;
}

.result-score-row {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 1rem;
}

.result-big {
  font-size: 56px;
  font-weight: 400;
  font-family: var(--mono);
  line-height: 1;
  letter-spacing: -0.02em;
}

.result-of {
  font-size: 14px;
  color: var(--cream3);
  font-weight: 300;
  margin-bottom: 8px;
}

.result-level {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 400;
  color: var(--cream);
  margin-bottom: 0.75rem;
  letter-spacing: 0.01em;
}

.result-level-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 12px;
  border-radius: 100px;
  margin-bottom: 1.5rem;
}

.result-desc {
  font-size: 14px;
  font-weight: 300;
  color: var(--cream2);
  line-height: 1.85;
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--line);
}

/* bars */
.bars-section { margin-bottom: 2rem; }

.bars-title {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--cream3);
  text-transform: uppercase;
  margin-bottom: 1.25rem;
}

.bar-item { margin-bottom: 1.1rem; }
.bar-item:last-child { margin-bottom: 0; }

.bar-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}

.bar-name { font-size: 13px; font-weight: 400; }
.bar-score { font-size: 12px; color: var(--cream3); font-weight: 300; }

.bar-track {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* recommend card */
.rec-card {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 2rem;
}

.rec-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--cream3);
  margin-bottom: 0.75rem;
}

.rec-text {
  font-size: 14px;
  font-weight: 300;
  color: var(--cream2);
  line-height: 1.85;
}

/* result buttons */
.btn-row { display: flex; gap: 10px; }

.btn-outline {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  color: var(--cream2);
  background: transparent;
  border: 1px solid var(--line2);
  border-radius: 100px;
  padding: 12px 20px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background .15s, color .15s, border-color .15s;
}
.btn-outline:hover { background: var(--bg2); color: var(--cream); border-color: var(--line2); }
.btn-outline:active { transform: scale(0.97); }

.btn-solid {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  color: var(--bg);
  background: var(--cream2);
  border: none;
  border-radius: 100px;
  padding: 12px 20px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background .15s;
}
.btn-solid:hover { background: var(--cream); }
.btn-solid:active { transform: scale(0.97); }

.qr-card {
  margin-top: 2rem;
  padding-top: 2rem;
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}

.qr-desc {
  font-size: 13px;
  color: var(--cream2);
  font-weight: 300;
  text-align: center;
  line-height: 1.6;
}

#qr-code {
  background: #fff;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
}

#qr-code canvas, #qr-code img { display: block; }

.qr-url {
  font-size: 11px;
  color: var(--cream3);
  letter-spacing: 0.03em;
  font-weight: 300;
}

.copy-msg {
  font-size: 11px;
  color: var(--c-teal);
  text-align: center;
  margin-top: 0.75rem;
  min-height: 16px;
  font-weight: 300;
  letter-spacing: 0.02em;
}

/* category color helpers */
.col-blue  { color: var(--c-blue);  border-color: rgba(38,112,176,.25); }
.col-teal  { color: var(--c-teal);  border-color: rgba(19,122,89,.25); }
.col-lav   { color: var(--c-lav);   border-color: rgba(105,69,190,.25); }
.col-amber { color: var(--c-amber); border-color: rgba(160,106,16,.25); }

.bg-col-blue  { background: rgba(38,112,176,.1); }
.bg-col-teal  { background: rgba(19,122,89,.1); }
.bg-col-lav   { background: rgba(105,69,190,.1); }
.bg-col-amber { background: rgba(160,106,16,.1); }

/* mobile */
@media (max-width: 480px) {
  #app { padding: 2.25rem 1.35rem 3.5rem; }
  #app::before { width: 100%; }
  .intro-title { font-size: 36px; }
  .q-num { font-size: 50px; }
  .q-body { font-size: 20px; }
  .result-big { font-size: 50px; }
  .result-level { font-size: 26px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ── INTRO ── -->
  <div class="screen active" id="s-intro">
    <p class="intro-label">Self Check · 2025</p>

    <h1 class="intro-title">
      AI 리터러시<br><em>자가 진단</em>
    </h1>

    <div class="intro-cats">
      <span class="intro-cat col-blue">기초 이해</span>
      <span class="intro-cat col-teal">도구 활용</span>
      <span class="intro-cat col-lav">프롬프트 역량</span>
      <span class="intro-cat col-amber">비판·윤리 의식</span>
    </div>

    <p class="intro-meta">
      12개 문항, 4개 영역<br>
      나의 AI 활용 수준을 솔직하게 점검해보세요.<br>
      소요 시간 약 3분 · 총 36점 만점
    </p>

    <button class="btn-start" onclick="startQuiz()">진단 시작하기</button>
  </div>

  <!-- ── QUESTION ── -->
  <div class="screen" id="s-question">
    <div class="q-top">
      <div class="q-num" id="q-num">01<span>/ 12</span></div>
      <div class="dot-prog" id="dot-prog"></div>
    </div>

    <span class="cat-tag" id="cat-tag">
      <span class="cat-dot" id="cat-dot"></span>
      <span id="cat-label"></span>
    </span>

    <p class="q-body" id="q-body"></p>

    <div class="ans-grid" id="ans-grid"></div>
    <p class="q-hint">선택하면 자동으로 다음 문항으로 이동합니다</p>
  </div>

  <!-- ── RESULT ── -->
  <div class="screen" id="s-result">
    <p class="result-eyebrow">진단 결과</p>

    <div class="result-score-row">
      <span class="result-big" id="r-total">—</span>
      <span class="result-of">/ 36점</span>
    </div>

    <div class="result-level" id="r-level"></div>
    <div class="result-level-badge" id="r-badge"></div>
    <p class="result-desc" id="r-desc"></p>

    <div class="bars-section">
      <p class="bars-title">영역별 점수</p>
      <div id="cat-bars"></div>
    </div>

    <div class="rec-card">
      <p class="rec-label">다음 단계 추천</p>
      <p class="rec-text" id="r-rec"></p>
    </div>

    <div class="btn-row">
      <button class="btn-outline" onclick="restart()">다시 하기</button>
      <button class="btn-solid" onclick="copyResult()">결과 복사</button>
    </div>
    <p class="copy-msg" id="copy-msg"></p>

    <div class="qr-card">
      <p class="rec-label">친구에게 공유하기</p>
      <p class="qr-desc">QR코드를 스캔하면 이 진단을 바로 시작할 수 있어요</p>
      <div id="qr-code"></div>
      <p class="qr-url">rhkrwkgid.github.io/ai-literacy</p>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const Qs = [
  { cat:"기초 이해",      q:"AI와 챗GPT의 차이를 다른 사람에게 설명할 수 있다" },

  { cat:"도구 활용",      q:"AI가 생성한 결과물을 반드시 검토하고 수정하는 편이다" },

const cats = ["기초 이해","도구 활용","프롬프트 역량","비판·윤리 의식"];
let cur = 0, scores = [];

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
}

function startQuiz() { cur = 0; scores = []; show('s-question'); renderQ(); }

function renderDots() {
  const prog = document.getElementById('dot-prog');
  prog.innerHTML = '';
  Qs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    prog.appendChild(d);
  });
}

function renderQ() {
  const q = Qs[cur];
  const m = catMeta[q.cat];

  const numEl = document.getElementById('q-num');
  numEl.innerHTML = String(cur + 1).padStart(2, '0') + '<span>/ 12</span>';

  renderDots();

  const tag = document.getElementById('cat-tag');
  tag.className = 'cat-tag ' + m.cls;
  document.getElementById('cat-dot').style.background = m.dot;
  document.getElementById('cat-label').textContent = q.cat;

  document.getElementById('q-body').textContent = q.q;

  const grid = document.getElementById('ans-grid');
  grid.innerHTML = '';
  Ans.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML =
      '<span class="ans-num">' + a.val + '</span>' +
      '<span class="ans-lbl">' + a.lbl.replace('\n','<br>') + '</span>';
    btn.onclick = () => pick(a.val);
    grid.appendChild(btn);
  });
}

function pick(val) {
  scores.push(val);
  cur++;
  if (cur >= Qs.length) showResult();
  else renderQ();
}

function catScore(cat) {
  return Qs.reduce((s, q, i) => q.cat === cat ? s + (scores[i]||0) : s, 0);
}

function showResult() {
  const total = scores.reduce((s,v) => s+v, 0);
  const lv = Levels.find(l => total <= l.max) || Levels[Levels.length-1];

  document.getElementById('r-total').textContent = total;
  document.getElementById('r-level').textContent = lv.name;
  document.getElementById('r-desc').textContent = lv.desc;
  document.getElementById('r-rec').textContent = lv.rec;
  document.getElementById('copy-msg').textContent = '';

  const badge = document.getElementById('r-badge');
  badge.textContent = lv.badge;
  badge.className = 'result-level-badge ' + lv.badgeCls + ' ' + catMeta[cats[0]].bg;
  // set badge bg per level color
  const badgeBgMap = { 'col-blue':'bg-col-blue','col-teal':'bg-col-teal','col-lav':'bg-col-lav','col-amber':'bg-col-amber' };
  badge.className = 'result-level-badge ' + lv.badgeCls + ' ' + badgeBgMap[lv.badgeCls];

  const barsEl = document.getElementById('cat-bars');
  barsEl.innerHTML = cats.map(cat => {
    const s = catScore(cat);
    const m = catMeta[cat];
    const id = 'bar_' + cat.replace(/[^a-z가-힣]/gi,'_');
    return '<div class="bar-item">'
      + '<div class="bar-header">'
      + '<span class="bar-name">' + cat + '</span>'
      + '<span class="bar-score">' + s + ' / 9</span>'
      + '</div>'
      + '<div class="bar-track"><div class="bar-fill" id="' + id + '" style="background:' + m.bar + ';width:0%"></div></div>'
      + '</div>';
  }).join('');

  show('s-result');

  const qrEl = document.getElementById('qr-code');
  qrEl.innerHTML = '';
  new QRCode(qrEl, {
    text: 'https://rhkrwkgid.github.io/ai-literacy/',
    width: 160,
    height: 160,
    colorDark: '#1C1A17',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });

  setTimeout(() => {
    cats.forEach(cat => {
      const s = catScore(cat);
      const id = 'bar_' + cat.replace(/[^a-z가-힣]/gi,'_');
      const el = document.getElementById(id);
      if (el) el.style.width = Math.round(s / 9 * 100) + '%';
    });
  }, 120);
}

function restart() { show('s-intro'); }

function copyResult() {
  const total = scores.reduce((s,v) => s+v, 0);
  const lv = Levels.find(l => total <= l.max) || Levels[Levels.length-1];
  const detail = cats.map(cat => cat + ' ' + catScore(cat) + '/9').join(' | ');
  const text = '[AI 리터러시 자가 진단]\n레벨: ' + lv.name + ' (' + total + '/36점)\n' + detail + '\n\n' + lv.desc;
  navigator.clipboard.writeText(text).then(() => {
    const m = document.getElementById('copy-msg');
    m.textContent = '클립보드에 복사되었습니다';
    setTimeout(() => { m.textContent = ''; }, 2500);
  });
}
</script>
